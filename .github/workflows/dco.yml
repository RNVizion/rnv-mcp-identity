name: DCO

# Enforces the Developer Certificate of Origin: every commit in a pull request
# must carry a `Signed-off-by:` trailer, the contributor's assertion that they are
# legally authorized to submit the change. Self-contained (no third-party action).
# Make this a required status check on `main` so unsigned commits cannot merge.

on:
  pull_request:

permissions:
  contents: read

jobs:
  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          # Non-merge commits introduced by this PR.
          for sha in $(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}"); do
            subject="$(git show -s --format='%s' "$sha")"
            author="$(git show -s --format='%an <%ae>' "$sha")"
            body="$(git show -s --format='%B' "$sha")"
            if printf '%s\n' "$body" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              # Presence satisfies the DCO assertion; warn (do not fail) if the
              # sign-off identity does not match the commit author.
              if printf '%s\n' "$body" | grep -qiF "Signed-off-by: ${author}"; then
                echo "ok        ${sha::8}  ${subject}"
              else
                echo "warn      ${sha::8}  sign-off does not match author ${author}"
              fi
            else
              echo "MISSING   ${sha::8}  no Signed-off-by  (${subject})"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo
            echo "DCO check failed: one or more commits are missing a Signed-off-by line."
            echo "Sign new commits with:   git commit -s"
            echo "Fix existing commits:    git rebase --signoff ${BASE_SHA} && git push --force-with-lease"
            exit 1
          fi
          echo "All commits carry a Developer Certificate of Origin sign-off."
