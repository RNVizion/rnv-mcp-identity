name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: lint + static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tools
        run: pip install -e ".[lint]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Bandit (security static analysis)
        run: bandit -c pyproject.toml -r src

  test:
    name: ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (crypto and test extras)
        run: pip install -e ".[dev,verify]"
      - name: Run the suite
        run: python -m pytest -q

  demo:
    name: demo (in-process)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (with FastMCP)
        run: pip install -e ".[dev,verify,fastmcp]"
      - name: Run the demo test
        run: python -m pytest -q tests/test_demo_inprocess.py
